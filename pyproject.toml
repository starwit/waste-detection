[tool.poetry]
name = "waste-detection"
version = "0.1.0"
description = ""
authors = ["Your Name <you@example.com>"]
readme = "README.md"
package-mode = false

[tool.poetry.dependencies]
python = "^3.11"
dvc = "^3.60.1"
dvc-ssh = "^4.2.1"
ruamel-yaml = "^0.18.14"
pyyaml = "^6.0.2"
object-detector-trainer = { git = "https://github.com/starwit/object-detector-trainer.git", branch = "feature/AB#2137-refactor-training-pipeline", extras = ["rtmdet"] }


[tool.poetry.group.dev.dependencies]
pytest = "^8.2.0"

[tool.pytest.ini_options]
markers = [
    "heavy: opt-in integration tests (slower and/or environment-sensitive)",
]


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
