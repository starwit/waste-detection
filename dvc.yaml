# dvc.yaml
stages:
  # Preflight: create placeholder files for optional direct DVC deps such as
  # finetune/baseline paths so dependency checks stay deterministic on fresh clones.
  check_optional_weight_deps:
    cmd: python -m object_detector_trainer.pipeline.check_optional_weight_deps
    deps:
      - params.yaml
      - pyproject.toml
      - poetry.lock
    outs:
      - .tmp/dvc_bootstrap.txt
    always_changed: true

  # Bootstrap: provision the selected model assets and write a manifest that
  # downstream stages depend on. Baseline weights remain an explicit `dvc pull`
  # (evaluation will fail loudly if a promoted baseline is missing locally).
  bootstrap_model_assets:
    cmd: >
      python -m train --stage bootstrap
      --model ${train.model}
    params:
      - train.model
      - models
      - evaluation.baseline_weights_path
    deps:
      - train.py
      - pyproject.toml
      - poetry.lock
      - .tmp/dvc_bootstrap.txt
    outs:
      - .tmp/bootstrap_manifest.json
    always_changed: true

  prepare_data:
    cmd: >
      python -m train --stage prepare
      --dataset-name ${data.dataset_name}
      --val-split ${prepare.val_split}
      --test-split ${prepare.test_split}
      --augment-multiplier ${prepare.augment_multiplier}
      --recreate-dataset
    params:
      - data
      - prepare
    deps:
      - train.py
      - pyproject.toml
      - poetry.lock
      - raw_data/
    outs:
      - datasets/${data.dataset_name}

  train_model:
    cmd: >
      python -m train --stage train
      --dataset-name ${data.dataset_name}
      --model ${train.model}
      --val-split ${prepare.val_split}
    params:
      - data
      - prepare.val_split
      - prepare.auto_replay
      - train
      - models
      - evaluation.baseline_weights_path
    deps:
      - train.py
      - pyproject.toml
      - poetry.lock
      - .tmp/dvc_bootstrap.txt
      - .tmp/bootstrap_manifest.json
      - datasets/${data.dataset_name}
      # Optional direct dependency: placeholder created by the preflight stage.
      - ${train.finetune.weights}
    outs:
      - runs

  evaluate_model:
    cmd: >
      python -m train --stage evaluate
      --dataset-name ${data.dataset_name}
      --model ${train.model}
      --val-split ${prepare.val_split}
    params:
      - data
      - prepare.val_split
      - train.model
      - evaluation.baseline_weights_path
      - data.class_mapping
    deps:
      - train.py
      - pyproject.toml
      - poetry.lock
      - .tmp/dvc_bootstrap.txt
      - .tmp/bootstrap_manifest.json
      - runs/.last_train_result.json
      - runs
      # Optional direct dependency: placeholder created by the preflight stage.
      - ${evaluation.baseline_weights_path}
    outs:
      - results_comparison/
    metrics:
      - metrics.json
