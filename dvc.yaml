# dvc.yaml
stages:
  # Preflight: verifies optional weight deps configured in params.yaml exist locally.
  # setup_project.py creates 0-byte placeholders for these paths on fresh clones so
  # DVC dependency checks stay deterministic and failures are explicit/actionable.
  check_optional_weight_deps:
    cmd: python -m trainer_core.pipeline.check_optional_weight_deps
    deps:
      - trainer_core/pipeline/check_optional_weight_deps.py
      - params.yaml
      - pyproject.toml
      - poetry.lock
    outs:
      - .tmp/dvc_bootstrap.txt
    always_changed: true

  prepare_data:
    cmd: >
      python -m train --stage prepare
      --dataset-name ${data.dataset_name}
      --val-split ${prepare.val_split}
      --test-split ${prepare.test_split}
      --augment-multiplier ${prepare.augment_multiplier}
      --recreate-dataset
    params:
      - data
      - prepare
    deps:
      - train.py
      - trainer_core/
      - pyproject.toml
      - poetry.lock
      - raw_data/
    outs:
      - datasets/${data.dataset_name}

  train_model:
    cmd: >
      python -m train --stage train
      --dataset-name ${data.dataset_name}
      --model ${train.model}
      --val-split ${prepare.val_split}
    params:
      - data
      - prepare.val_split
      - train
      - models
      - evaluation.baseline_weights_path
    deps:
      - train.py
      - trainer_core/
      - pyproject.toml
      - poetry.lock
      - .tmp/dvc_bootstrap.txt
      - datasets/${data.dataset_name}
      # Optional but path-stable dependency: placeholder created by setup_project.py.
      - ${train.finetune.weights}
    outs:
      - runs

  evaluate_model:
    cmd: >
      python -m train --stage evaluate
      --dataset-name ${data.dataset_name}
      --model ${train.model}
      --val-split ${prepare.val_split}
    params:
      - data
      - prepare.val_split
      - train.model
      - evaluation.baseline_weights_path
      - data.class_mapping
      - prepare.auto_replay
    deps:
      - train.py
      - trainer_core/
      - pyproject.toml
      - poetry.lock
      - .tmp/dvc_bootstrap.txt
      - runs/.last_train_result.json
      - runs
      # Optional but path-stable dependency: placeholder created by setup_project.py.
      - ${evaluation.baseline_weights_path}
    outs:
      - results_comparison/
    metrics:
      - metrics.json
