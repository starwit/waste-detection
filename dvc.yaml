# dvc.yaml
stages:
  prepare_data:
    cmd: >
      python yolov8_training/train_pipeline.py --stage prepare
      --dataset-name ${data.dataset_name}
      --val-split ${prepare.val_split}
      --test-split ${prepare.test_split}
      --augment-multiplier ${prepare.augment_multiplier}
      --recreate-dataset
    params:
      - data
      - prepare
    deps:
      - yolov8_training/train_pipeline.py
      - yolov8_training/utils/data_utils.py
      - yolov8_training/utils/find_duplicates.py
      - yolov8_training/utils/augmentation.py
      - raw_data/
    outs:
      - datasets/${data.dataset_name}

  train_and_evaluate:
    cmd: >
      python yolov8_training/train_pipeline.py --stage train
      --dataset-name ${data.dataset_name}
      --model ${train.model}
      --val-split ${prepare.val_split}
    params:
      - data
      - prepare.val_split
      - train
      - models
      - evaluation.baseline_weights_path
    deps:
      - yolov8_training/train_pipeline.py
      - yolov8_training/backends/__init__.py
      - yolov8_training/backends/yolo_backend.py
      - yolov8_training/backends/rfdetr_backend.py
      - yolov8_training/utils/evaluate.py
      - yolov8_training/utils/data_utils.py
      - yolov8_training/utils/rfdetr_adapter.py
      - yolov8_training/utils/find_duplicates.py
      - datasets/${data.dataset_name}
      # Track configured weight paths so DVC re-runs when they change.
      # On fresh clones _ensure_default_baseline_stub() creates 0-byte stubs
      # that satisfy DVC but are rejected at runtime (size == 0), causing
      # the pipeline to fall back to an official YOLO COCO checkpoint.
      - ${train.finetune.weights}
      - ${evaluation.baseline_weights_path}
    outs:
      - runs
      - results_comparison/
    metrics: 
      - metrics.json
