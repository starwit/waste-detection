      hash: md5
      md5: 85aee9cd57cd9434da3820c9f81ab01a
      size: 17527
    params:
      params.yaml:
        data:
          dataset_name: waste-detection
          experiment_name: waste-detection
          custom_classes:
          - waste
          - cigarette
          - leaf_pile
          - leaf_region_dense
          - leaf_region_sparse
          - bottle
          use_coco_classes: false
          class_mapping:
            waste:
            - waste
            - bottle
            cigarette:
            - cigarette
            leaves_dense:
            - leaf_pile
            - leaf_region_dense
            leaves_sparse:
            - leaf_region_sparse
        evaluation.baseline_weights_path: models/current_best/best.pt
        models:
          yolov8m:
            backend: yolo
            checkpoint: yolov8m.pt
          yolo11m:
            backend: yolo
            checkpoint: yolo11m.pt
          rfdetr-medium:
            backend: rfdetr
            variant: medium
            resolution: 1280
            epochs: 150
            batch_size: 2
            target_effective_batch: 16
            lr: 0.0001
            gradient_checkpointing: false
            extra_train_kwargs:
              num_workers: 4
              multi_scale: true
              expanded_scales: true
              lr_drop: 120
              checkpoint_interval: 10
              warmup_epochs: 1.0
              early_stopping: true
              early_stopping_patience: 30
              early_stopping_min_delta: 0.001
          rfdetr-nano:
            backend: rfdetr
            variant: nano
            resolution: 1280
            epochs: 80
            batch_size: 2
            target_effective_batch: 16
            lr: 0.0001
            gradient_checkpointing: false
        prepare.val_split: 0.1
        train:
          model: yolo11m
          image_size: 1280
          epochs: 100
          batch_size: 4
          finetune:
            enabled: false
            weights: models/current_best/best.pt
            lr: 0.0012
            epochs: 30
            freeze_backbone: true
            optimizer: AdamW
            mosaic: 0.15
            close_mosaic: 5
            mixup: 0.0
            cos_lr: true
            lrf: 0.05
            patience: 20
    outs:
