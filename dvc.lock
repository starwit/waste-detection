            max_new: 200
            max_total: 400
            iou_thr: 0.5
            conf_thr: 0.25
            border_conf: 0.35
            include_empty: true
            seed: 42
            dest: raw_data/train/replay
          folder_subsets:
            cw36-auto-mined: 2.0
            replay: 2.0
            cw33: 200
            cw32-08-07-train: 200
            taco: 100
            uavvaste: 200
