            include_empty: true
            seed: 42
            dest: raw_data/train/replay
          folder_subsets:
            uavvaste: 0.1
            taco: 0.02
            cw32-08-07-train: 1
            cw33: 1
            cw36-auto-mined: 1.0
            cw41-auto-mined: 1.5
            replay: 1.5
