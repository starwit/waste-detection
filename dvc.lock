    params:
      params.yaml:
        data:
          dataset_name: waste-detection
          experiment_name: waste-detection
          custom_classes:
          - waste
          - cigarette
          - leaf_pile
          - leaf_region_dense
          - leaf_region_sparse
          - bottle
          use_coco_classes: false
          class_mapping:
            waste:
            - waste
            - bottle
            cigarette:
            - cigarette
            leaves_dense:
            - leaf_pile
            - leaf_region_dense
            leaves_sparse:
            - leaf_region_sparse
        prepare:
          val_split: 0.1
          test_split: 0.1
          augment_multiplier: 1
          auto_replay:
            enabled: false
            max_new: 200
            max_total: 400
            iou_thr: 0.5
            conf_thr: 0.25
            border_conf: 0.35
            include_empty: true
            seed: 42
            dest: raw_data/train/replay
          folder_subsets:
            uavvaste: 0.1
            taco: 0.02
            cw32-08-07-train: 1
            cw33: 1
            cw36-auto-mined: 1.0
            cw41-auto-mined: 1.0
            cw39-sam3-gated: 1.5
            cw39-maybe-false-positives: 1.5
